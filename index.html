<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VereinsManager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

    <div class="logo">
    ⚽ FV Matzenberg
</div>

<button
    class="settingsButton"
    onclick="toggleSettings()">

⚙️

</button>

    <select id="veranstaltung">

        <option>Training</option>
        <option>Heimspiel Jugend</option>
        <option>Heimspiel Aktive</option>
        <option>Turnier</option>
        <option>Vereinsfest</option>
        <option>Sonstiges</option>

    </select>

</header>

    <div id="settings" class="settings">

<div class="settingsHeader">

    <h2>⚙ Einstellungen</h2>

    <button
        class="closeButton"
        onclick="toggleSettings()">
        ✖
    </button>

</div>

<h3>Getränke</h3>

<div id="settingsGetraenke"></div>

<button onclick="speichern()">
    💾 Speichern
</button>

</div>
    
<main>

<section class="card stats">

    <div>
        <span>💰 Umsatz</span>
        <strong id="umsatz">0,00 €</strong>
    </div>

    <div>
        <span>💵 Kasse</span>
        <strong id="kasse">150,00 €</strong>
    </div>

    <div>
        <span>📤 Entnahme</span>
        <strong id="entnahme">0,00 €</strong>
    </div>

</section>

<section class="card">

    <h2>🛒 Aktueller Verkauf</h2>

    <div id="warenkorb">

        Noch keine Artikel

    </div>

    <hr style="margin:15px 0;">

    <h3>
        Gesamt:
        <span id="gesamt">
            0,00 €
        </span>
    </h3>

</section>

<section class="card">

    <h2>🍺 Getränke</h2>

    <div id="getraenkeGrid" class="grid">

    </div>

</section>

<section class="card">

    <h2>💵 Bezahlen</h2>

    <input
    id="bezahlt"
    type="number"
    step="0.01"
    placeholder="0,00 €"
    oninput="berechneRueckgeld()">

    <div class="geldButtons">

    <button onclick="setBezahlt(5)">5 €</button>
    <button onclick="setBezahlt(10)">10 €</button>
    <button onclick="setBezahlt(20)">20 €</button>
    <button onclick="setBezahlt(50)">50 €</button>

</div>

    <h3>

        Rückgeld:

        <span id="rueckgeld">

            0,00 €

        </span>

    </h3>

    <button
    class="verkauf"
    onclick="verkaufAbschliessen()">

        ✅ Verkauf abschließen

    </button>

    <button
    class="abbrechen"
    onclick="verkaufLoeschen()">

    🗑 Verkauf löschen


    </button>
    
</section>

<section class="card">

    <h2>📈 Historie</h2>

    <div id="historie">

        Noch keine Verkäufe

    </div>

</section>

</main>

<footer>

    VereinsManager v1.0.0 Alpha

</footer>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/verkauf.js"></script>
<script src="js/app.js"></script>

</body>
</html>
