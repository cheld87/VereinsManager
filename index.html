<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VereinsManager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

    <div class="logo">
    ⚽ FV Matzenberg
</div>

<button
    class="settingsButton"
    onclick="toggleSettings()">

⚙️

</button>

    <select id="veranstaltung">

        <option>Training</option>
        <option>Heimspiel Jugend</option>
        <option>Heimspiel Aktive</option>
        <option>Turnier</option>
        <option>Vereinsfest</option>
        <option>Sonstiges</option>

    </select>

</header>

    <div id="settings" class="settings">

<div class="settingsHeader">

    <h2>⚙ Einstellungen</h2>

    <button
        class="closeButton"
        onclick="toggleSettings()">
        ✖
    </button>

</div>

<h3>Getränke</h3>

<div id="settingsGetraenke"></div>


</div>
    
<main>

<section class="card stats">

    <div>
        <span>💰 Umsatz</span>
        <strong id="umsatz">0,00 €</strong>
    </div>

    <div>
        <span>💵 Kasse</span>
        <strong id="kasse">150,00 €</strong>
    </div>

    <div id="lagerStatus" onclick="showLagerStatus()">
        <span>📦 Lager</span>

        <strong id="lagerOk">0 OK</strong>

        <small id="lagerWarnung">0 KNAPP • 0 LEER</small>
    </div>
   
    <div>
        <span>🏆 Topseller</span>
        <strong id="topseller">-</strong>
    </div>
    

</section>

<section class="card">

    <h2>🛒 Aktueller Verkauf</h2>

    <div id="warenkorb">

        Noch keine Artikel

    </div>

    <hr style="margin:15px 0;">

    <h3>
        Gesamt:
        <span id="gesamt">
            0,00 €
        </span>
    </h3>

</section>

<section class="card">

    <h2>🍺 Getränke</h2>

    <div id="getraenkeGrid" class="grid">

    </div>

</section>

<section class="card">

    <h2>💵 Bezahlen</h2>

    <input
    id="bezahlt"
    type="number"
    step="0.01"
    placeholder="0,00 €"
    oninput="berechneRueckgeld()">

    <div class="geldButtons">

    <button onclick="setBezahlt(5)">5 €</button>
    <button onclick="setBezahlt(10)">10 €</button>
    <button onclick="setBezahlt(20)">20 €</button>
    <button onclick="setBezahlt(50)">50 €</button>

</div>

    <h3>

        Rückgeld:

        <span id="rueckgeld">

            0,00 €

        </span>

    </h3>

    <button
    class="verkauf"
    onclick="verkaufAbschliessen()">

        ✅ Verkauf abschließen

    </button>

<button
class="neuButton"
onclick="mitgliedAuswahl()">

👤 Auf Mitglied buchen

</button>

<button
class="neuButton"
onclick="strichlisteAuswahl()">

📋 Auf Strichliste

</button>

    <button
    class="abbrechen"
    onclick="verkaufLoeschen()">

    🗑 Verkauf löschen


    </button>
    
</section>

<section class="card">

    <h2>📈 Historie</h2>

    <div id="historie">

        Noch keine Verkäufe

    </div>

    <button
class="neuButton"
onclick="showKassenabschluss()">

💰 Kassenabschluss

</button>

    <button
class="neuButton"
onclick="showAbschlussHistorie()">

📚 Abschlusshistorie

</button>

    <button
class="neuButton"
onclick="showMitglieder()">

👥 Mitglieder

</button>
    
</section>

</main>

<footer id="version"></footer>

<script src="js/data.js?v=087"></script>
<script src="js/storage.js?v=085"></script>

<script src="js/debug.js?v=085"></script>

<script src="js/verkauf.js?v=086"></script>
<script src="js/lager.js?v=085"></script>
<script src="js/settings.js?v=085"></script>
<script src="js/statistik.js?v=085"></script>
<script src="js/abschluss.js?v=085"></script>
<script src="js/backup.js?v=085"></script>
<script src="js/mitglieder.js?v=091"></script>
<script src="js/ui.js?v=085"></script>

<script src="js/app.js?v=085"></script>
    
 <div id="artikelDialog" class="modal" style="display:none;">

    <div class="modalContent">

        <h2 id="dialogTitel">✏️ Artikel bearbeiten</h2>

        <label>Emoji</label>
        <input id="editEmoji">

        <label>Name</label>
        <input id="editName">

        <label>Preis</label>
        <input
            id="editPreis"
            type="number"
            step="0.01">

        <div class="dialogButtons">

            <button onclick="dialogSchliessen()">
                Abbrechen
            </button>

            <button onclick="artikelSpeichern()">
                💾 Speichern
            </button>

        </div>

    </div>

</div>

    <div id="lagerDialog" class="modal"> style="display:none;">

    <div class="modalContent">

        <button
            class="closeButton"
            onclick="document.getElementById('lagerDialog').style.display='none'">
            ✖
        </button>

        <div id="lagerDialogInhalt"></div>

    </div>

</div> 
    
    <button onclick="testDebug()">
    Debug Test
    </button>

</body>
</html>
